<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Hub - Shop</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- ===== NAVBAR (SAME ON ALL PAGES) ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🎌 Anime Hub</a>
            
            <!-- Mobile Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Navbar Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="hub.html">Community Hub</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="shop.html">Shop</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ===== SHOP HEADER ===== -->
    <section class="shop-header py-5 mt-5 bg-light">
        <div class="container text-center">
            <h1 class="display-3 fw-bold anime-title">🛍️ Anime Merchandise</h1>
            <p class="lead">Exclusive collectibles, apparel, and accessories for true anime fans</p>
        </div>
    </section>

    <!-- ===== SHOP GRID WITH FILTER BUTTONS ===== -->
    <section class="shop-grid py-5">
        <div class="container">
            
            <!-- Filter Buttons (JavaScript Feature) -->
            <div class="row mb-4">
                <div class="col-12 text-center">
                    <div class="btn-group" role="group">
                        <button class="btn btn-primary filter-btn active" data-filter="all">All Items</button>
                        <button class="btn btn-outline-primary filter-btn" data-filter="jujutsu">Jujutsu Kaisen</button>
                        <button class="btn btn-outline-primary filter-btn" data-filter="onepiece">One Piece</button>
                        <button class="btn btn-outline-primary filter-btn" data-filter="other">Other Anime</button>
                    </div>
                </div>
            </div>
            
            
            
            <!-- Cart Notification (JavaScript Feature) -->
            <div id="cartNotification" class="alert alert-success mt-4 d-none">
                ✅ Item added to cart! 🛒
            </div>
            
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2026 Anime Hub. Made with ❤️ for all anime fans.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
